      document.getElementById("badCount").textContent = summary.bad;
      document.getElementById("unknownCount").textContent = summary.unknown;
      document.getElementById("highAttentionCount").textContent = summary.highAttention;
      document.getElementById("highRiskCount").textContent = summary.highRisk;
      document.getElementById("newDomesticCount").textContent = summary.newDomestic;
      document.getElementById("newIntlCount").textContent = summary.newIntl;
    }

    function render() {
      const q = document.getElementById("q").value.trim().toLowerCase();
      const level = document.getElementById("level").value;
      const sortBy = document.getElementById("sortBy").value;
      const newOnly = document.getElementById("newOnly").value;
      const filtered = items.filter(item => {
        const blob = Object.values(item).join(" ").toLowerCase();
        return (!level || item.level === level)
          && (!q || blob.includes(q))
          && (!newOnly || isNewItem(item));
      }).sort((a, b) => compareItems(a, b, sortBy));

      Object.values(rootMap).forEach(el => el.innerHTML = "");
      updateSummary(filtered);
      let intl = 0;
      let domestic = 0;

      filtered.forEach((item, index) => {
        if (item.side === "国际") intl += 1; else domestic += 1;
        const rank = item.side === "国际" ? intl : domestic;
        const card = document.createElement("article");
        card.className = `card ${item.level}`;
        card.innerHTML = `
          <div class="topline">
            <span class="rank">${String(rank).padStart(2, "0")}</span>
            <span class="line">${item.side}线</span>
            <span class="impact ${item.level}">重要度：${levelText[item.level]}</span>
            <span class="sentiment ${sentimentClass[item.sentiment]}">${item.sentiment}</span>
            ${isNewItem(item) ? '<span class="new-badge">新增</span>' : ''}
            ${isFocusItem(item) ? '<span class="focus-badge">重点观察</span>' : ''}
            <span class="tag">${item.sector}</span>
          </div>
          <div class="trade-grid">
            <div class="trade-cell"><b>催化类型</b><span>${catalystType(item)}</span></div>
            <div class="trade-cell"><b>影响周期</b><span>${impactHorizon(item)}</span></div>
            <div class="trade-cell"><b>资金关注度</b><span>${attentionLevel(item)}</span></div>
            <div class="trade-cell"><b>交易方向</b><span>${tradeAction(item)}</span></div>
            <div class="trade-cell"><b>确定性评分</b><span>${certaintyScore(item)}</span></div>
            <div class="trade-cell"><b>风险等级</b><span>${riskLevel(item)}</span></div>
          </div>
          <h3>${item.title}</h3>
          <p class="detail-line"><span class="label">事实：</span>${item.fact}</p>
          <p class="detail-line"><span class="label">A股映射：</span>${item.map}</p>
          <p class="detail-line"><span class="label">相关板块或个股：</span>${item.related}</p>
          <p class="detail-line risk"><span class="label">风险：</span>${item.risk}</p>
          <p class="source-line"><span><span class="label">来源：</span><a href="${item.url}" target="_blank" rel="noopener">${item.source}</a></span><span><span class="label">发布时间：</span>${sourceTimeHtml(item)}</span></p>
        `;
        rootMap[item.side].appendChild(card);
      });

      document.getElementById("intlCount").textContent = `显示 ${intl} / 10`;
      document.getElementById("domesticCount").textContent = `显示 ${domestic} / 10`;
    }

    document.getElementById("q").addEventListener("input", render);
    document.getElementById("level").addEventListener("change", render);
    document.getElementById("sortBy").addEventListener("change", render);
    document.getElementById("newOnly").addEventListener("change", render);
    document.querySelectorAll(".section-toggle").forEach(button => {
      button.addEventListener("click", () => {
        document.getElementById(button.dataset.target).classList.toggle("collapsed");
      });
    });
    render();
    localStorage.setItem(snapshotKey, JSON.stringify(items.map(stableId)));
    localStorage.setItem(snapshotTimeKey, currentSnapshotTime);
  </script>
</body>
</html>
