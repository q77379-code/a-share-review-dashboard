      color: var(--muted);

      margin-bottom: 4px;

    .summary-item span {

      font-size: 20px;
      font-weight: 800;
    }

      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      padding: 18px 28px 28px;

    section {
      min-width: 0;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 0 12px;
    }

      align-items: center;
      gap: 8px;
      height: 34px;
      padding: 0;
      border: 0;
      background: transparent;
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);

    }

      color: var(--muted);

      font-size: 20px;

    const sentimentRank = { "利好": 0, "未知": 1, "利空": 2 };
    const rootMap = { "国际": document.getElementById("international"), "国内": document.getElementById("domestic") };
    const snapshotKey = "a_share_short_news_snapshot_ids";
    const snapshotTimeKey = "a_share_short_news_snapshot_time";
    const currentSnapshotTime = "2026-07-20 12:50 CST";
    const previousIds = new Set(JSON.parse(localStorage.getItem(snapshotKey) || "[]"));
    const hasPreviousSnapshot = previousIds.size > 0;

    function timeValue(sourceTime) {
      const match = sourceTime.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})/);
      if (!match) return 0;
      const [, year, month, day, hour, minute] = match.map(Number);
      return new Date(year, month - 1, day, hour, minute).getTime();
    }

    function compareItems(a, b, sortBy) {
      if (sortBy === "level") {
        return levelRank[a.level] - levelRank[b.level] || timeValue(b.sourceTime) - timeValue(a.sourceTime);
      }
      if (sortBy === "sentiment") {
        return sentimentRank[a.sentiment] - sentimentRank[b.sentiment] || timeValue(b.sourceTime) - timeValue(a.sourceTime);
      }
      return timeValue(b.sourceTime) - timeValue(a.sourceTime);
    }

    function sourceTimeHtml(item) {
      return item.side === "国际"
        ? item.sourceTime.replace(/^(\d{4}-\d{2}-\d{2})/, '$1<span class="day-offset">(-1)</span>')
        : item.sourceTime;
    }

    function includesAny(text, words) {
      return words.some(word => text.includes(word));
    }

    function stableId(item) {
      return `${item.side}|${item.title}|${item.source}|${item.sourceTime}`;
    }

    function isNewItem(item) {
      return hasPreviousSnapshot && !previousIds.has(stableId(item));
    }

    function catalystType(item) {
      const text = `${item.title}${item.fact}${item.sector}`;
      if (includesAny(text, ["规划", "政策", "备案", "启动", "专项行动", "关税", "管制", "白宫"])) return "政策催化";
      if (includesAny(text, ["业绩", "预告", "营收", "ASML", "台积电"])) return "业绩催化";
      if (includesAny(text, ["IPO", "申购", "社融", "M2", "美元指数", "美债", "北向资金"])) return "资金催化";
      if (includesAny(text, ["GDP", "PPI", "零售", "用电", "进出口", "工业", "社零", "固定资产", "初请", "通胀", "产出"])) return "数据催化";
      if (includesAny(text, ["EIA", "IEA", "OPEC", "稀土", "地缘", "油市", "库存"])) return "事件催化";
      return "事件催化";
    }

    function impactHorizon(item) {
      const text = `${item.title}${item.sector}`;
      if (includesAny(text, ["关税", "管制", "WSTS", "机器人", "规划", "SEMI", "国产替代"])) return "一周";
      if (includesAny(text, ["业绩", "预告", "申购", "备案", "ASML", "台积电", "电子布"])) return "1-3日";
      if (includesAny(text, ["GDP", "PPI", "零售", "初请", "通胀", "EIA", "美元指数", "美债", "社融"])) return "日内";
      if (includesAny(text, ["White House", "半导体关税"])) return "中线";
      return item.level === "hot" ? "1-3日" : "日内";
    }

    function attentionLevel(item) {
      const text = `${item.title}${item.sector}${item.related}`;
      if (item.level === "hot" || includesAny(text, ["AI", "半导体", "机器人", "算力", "存储", "PCB", "端侧", "数据中心"])) return "高";
      if (item.level === "high" || includesAny(text, ["消费", "出口", "有色", "油气", "券商", "电力"])) return "中";
      return "低";
    }

    function tradeAction(item) {
      const text = `${item.title}${item.risk}${item.related}`;
      if (item.sentiment === "利空") return "避险";
      if (includesAny(text, ["高位", "溢价", "抽血", "扰动", "分歧"])) return "谨慎追高";
      if (item.sentiment === "未知") return item.level === "hot" ? "只看龙头" : "观察";
      if (attentionLevel(item) === "高") return "只看龙头";
      return "可参与";
    }

    function certaintyScore(item) {
      const text = `${item.source}${item.title}${item.fact}`;
      if (includesAny(text, ["国家统计局", "海关总署", "国家能源局", "上海证券交易所", "美国劳工统计局", "EIA", "Federal Reserve", "Eurostat"])) return "5星";
      if (includesAny(text, ["国家发展改革委", "ASML", "TSMC", "WSTS", "IEA", "OPEC", "SEMI", "工信"])) return "4星";
      if (includesAny(text, ["财联社", "科创板日报", "证券时报"])) return "3星";
      if (includesAny(text, ["Financial Times", "外媒"])) return "3星";
      return "3星";
    }

    function riskLevel(item) {
      const text = `${item.title}${item.risk}${item.sentiment}`;
      if (item.sentiment === "利空" || includesAny(text, ["高位", "溢价", "抽血", "扰动", "外媒", "地缘", "关税", "管制", "退市"])) return "高";
      if (includesAny(text, ["分歧", "兑现", "周期", "审批", "不确定", "价格波动", "未必", "传导偏间接"])) return "中";
      return "低";
    }

    function isFocusItem(item) {
      return item.level === "hot"

    function updateSummary(list) {
      const summary = list.reduce((acc, item) => {
        if (item.sentiment === "利好") acc.good += 1;
        if (item.sentiment === "利空") acc.bad += 1;
        if (item.sentiment === "未知") acc.unknown += 1;
        if (attentionLevel(item) === "高") acc.highAttention += 1;
        if (riskLevel(item) === "高") acc.highRisk += 1;
        if (isNewItem(item) && item.side === "国内") acc.newDomestic += 1;
        if (isNewItem(item) && item.side === "国际") acc.newIntl += 1;
        return acc;
      }, { good: 0, bad: 0, unknown: 0, highAttention: 0, highRisk: 0, newDomestic: 0, newIntl: 0 });

      document.getElementById("goodCount").textContent = summary.good;
      document.getElementById("badCount").textContent = summary.bad;
      document.getElementById("unknownCount").textContent = summary.unknown;
      document.getElementById("highAttentionCount").textContent = summary.highAttention;
      document.getElementById("highRiskCount").textContent = summary.highRisk;
      document.getElementById("newDomesticCount").textContent = summary.newDomestic;
      document.getElementById("newIntlCount").textContent = summary.newIntl;
    }

          <p class="detail-line"><span class="label">相关板块或个股：</span>${item.related}</p>
          <p class="detail-line risk"><span class="label">风险：</span>${item.risk}</p>
          <p class="source-line"><span><span class="label">来源：</span><a href="${item.url}" target="_blank" rel="noopener">${item.source}</a></span><span><span class="label">发布时间：</span>${sourceTimeHtml(item)}</span></p>
        `;
        rootMap[item.side].appendChild(card);
      });

      document.getElementById("intlCount").textContent = `显示 ${intl} / 10`;
      document.getElementById("domesticCount").textContent = `显示 ${domestic} / 10`;
    }

    document.getElementById("q").addEventListener("input", render);
    document.getElementById("level").addEventListener("change", render);
    document.getElementById("sortBy").addEventListener("change", render);
    document.getElementById("newOnly").addEventListener("change", render);
    document.querySelectorAll(".section-toggle").forEach(button => {
      button.addEventListener("click", () => {
        document.getElementById(button.dataset.target).classList.toggle("collapsed");
      });
    });
    render();
    localStorage.setItem(snapshotKey, JSON.stringify(items.map(stableId)));
    localStorage.setItem(snapshotTimeKey, currentSnapshotTime);
  </script>
</body>
</html>
